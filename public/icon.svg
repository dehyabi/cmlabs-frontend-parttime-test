<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Pan body -->
  <ellipse cx="256" cy="280" rx="140" ry="100" fill="#2d3748"/>
  
  <!-- Pan handle -->
  <rect x="380" y="240" width="100" height="40" rx="20" fill="#2d3748"/>
  <rect x="400" y="250" width="80" height="20" rx="10" fill="#4a5568"/>
  
  <!-- Egg white -->
  <ellipse cx="220" cy="300" rx="60" ry="45" fill="#ffffff"/>
  
  <!-- Egg yolk -->
  <circle cx="230" cy="295" r="25" fill="#fbbf24"/>
  <circle cx="235" cy="290" r="8" fill="#f59e0b" opacity="0.5"/>
  
  <!-- Bacon strips -->
  <g transform="translate(280, 260)">
    <rect x="0" y="0" width="50" height="8" rx="4" fill="#dc2626"/>
    <rect x="0" y="0" width="15" height="8" rx="2" fill="#fcd34d"/>
    <rect x="25" y="0" width="15" height="8" rx="2" fill="#fcd34d"/>
    <rect x="0" y="15" width="50" height="8" rx="4" fill="#dc2626"/>
    <rect x="10" y="15" width="15" height="8" rx="2" fill="#fcd34d"/>
    <rect x="35" y="15" width="15" height="8" rx="2" fill="#fcd34d"/>
  </g>
  
  <!-- Steam lines -->
  <path d="M200 180 Q210 160, 200 140" stroke="#e2e8f0" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M240 170 Q250 145, 240 120" stroke="#e2e8f0" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M280 175 Q290 155, 280 135" stroke="#e2e8f0" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Shine -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="none" stroke="white" stroke-width="0" opacity="0.3"/>
  <path d="M150 150 Q200 120, 280 150" stroke="white" stroke-width="20" fill="none" opacity="0.1" stroke-linecap="round"/>
</svg>